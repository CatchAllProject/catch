<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="reset.css">
    <link rel="stylesheet" href="global.css">
    <link rel="stylesheet" href="index.css">
    <title>Leitor de Saves</title>
</head>
<body>
    <div class="main_container">
            <h1>Leitor de Saves</h1>
            <input type="file" id="saveInput" hidden>
            <label for="saveInput" id="saveImportLabel">Carregar Save</label>
            <div class="info_container">
                <div id="trainerCard" class="trainerCardTemplate">
                    <img src="images/trainer_card_template.png" alt="">
                    <div id="save_data">
                        <label id="trainer_name">trainerName</label>
                        <label id="trainer_money">0000</label>
                        <label id="trainer_time">00:00:00</label>
                    </div>
                    <div id="badge_block">
                        <li id="block_1" class="block"></li>
                        <li id="block_2" class="block"></li>
                        <li id="block_3" class="block"></li>
                        <li id="block_4" class="block"></li>
                        <li id="block_5" class="block"></li>
                        <li id="block_6" class="block"></li>
                        <li id="block_7" class="block"></li>
                        <li id="block_8" class="block"></li>
                    </div>
                </div> 
                <div class="pokedex_template">
                    <img src="images/pokedex_template.webp" alt="">
                    <div id="dex_data">
                        <div id="seened">
                            <label id="seen">0</label>
                            <label id="own">0</label>
                        </div>
                        <div id="alert">Em Breve!</div>
                    </div>
                </div>
            </div>
    </div>
    
</body>
</html>
<script src="save_decoder.js"></script>
